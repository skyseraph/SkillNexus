<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Main gradient: purple to teal -->
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:1" />
    </linearGradient>

    <!-- Inner glow gradient for the S -->
    <linearGradient id="grad-s" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.95" />
    </linearGradient>

    <!-- Subtle dark fill for hexagon body -->
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter for border ring -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft drop shadow for the whole mark -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#6c63ff" flood-opacity="0.35"/>
    </filter>

    <!-- Clip path for hexagon -->
    <clipPath id="hex-clip">
      <!-- Regular hexagon flat-top, centered at 60,60, radius ~52 -->
      <polygon points="
        60,8
        112,34
        112,86
        60,112
        8,86
        8,34
      "/>
    </clipPath>
  </defs>

  <!-- ── Drop shadow group ── -->
  <g filter="url(#shadow)">

    <!-- ── Hexagon background fill ── -->
    <polygon
      points="60,8 112,34 112,86 60,112 8,86 8,34"
      fill="url(#grad-bg)"
    />

    <!-- ── Gradient border ring (stroke only) ── -->
    <polygon
      points="60,8 112,34 112,86 60,112 8,86 8,34"
      fill="none"
      stroke="url(#grad-main)"
      stroke-width="3.5"
      filter="url(#glow)"
    />

    <!-- ── Connector nodes at hexagon vertices (circuit-nexus motif) ── -->
    <!-- Top -->
    <circle cx="60" cy="8"   r="3.5" fill="url(#grad-main)" opacity="0.85"/>
    <!-- Top-right -->
    <circle cx="112" cy="34" r="3.5" fill="url(#grad-main)" opacity="0.85"/>
    <!-- Bottom-right -->
    <circle cx="112" cy="86" r="3.5" fill="url(#grad-main)" opacity="0.85"/>
    <!-- Bottom -->
    <circle cx="60"  cy="112" r="3.5" fill="url(#grad-main)" opacity="0.85"/>
    <!-- Bottom-left -->
    <circle cx="8"  cy="86"  r="3.5" fill="url(#grad-main)" opacity="0.85"/>
    <!-- Top-left -->
    <circle cx="8"  cy="34"  r="3.5" fill="url(#grad-main)" opacity="0.85"/>

    <!-- ── Inner faint circuit lines radiating from center to mid-edges ── -->
    <g stroke="url(#grad-main)" stroke-width="0.8" opacity="0.18">
      <!-- To top vertex -->
      <line x1="60" y1="60" x2="60" y2="8"/>
      <!-- To top-right vertex -->
      <line x1="60" y1="60" x2="112" y2="34"/>
      <!-- To bottom-right vertex -->
      <line x1="60" y1="60" x2="112" y2="86"/>
      <!-- To bottom vertex -->
      <line x1="60" y1="60" x2="60" y2="112"/>
      <!-- To bottom-left vertex -->
      <line x1="60" y1="60" x2="8" y2="86"/>
      <!-- To top-left vertex -->
      <line x1="60" y1="60" x2="8" y2="34"/>
    </g>

    <!-- ── Stylized "S" letterform — drawn as a path for precision ── -->
    <!--
      The S is constructed from two arcs meeting at center,
      forming a clean geometric letterform.
      Overall bounds: x 34–86, y 26–94
      Top arc center: (60, 47), radius 20
      Bottom arc center: (60, 73), radius 20
    -->
    <path
      d="
        M 76,34
        C 76,26 44,26 44,47
        C 44,58 60,58 60,58
        C 60,58 76,58 76,73
        C 76,94 44,94 44,86
      "
      fill="none"
      stroke="url(#grad-s)"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- ── Upward spark / growth arrow above S top ── -->
    <!--
      A small upward chevron at the top of the S to hint at "growth/evolution"
    -->
    <polyline
      points="54,30 60,22 66,30"
      fill="none"
      stroke="#00d4aa"
      stroke-width="2.8"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.9"
    />

  </g>
</svg>
